<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Слайдер изображений</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="slider" aria-roledescription="карусель" aria-label="Слайдер изображений">

    <button class="slider__btn slider__btn--prev" id="prevBtn" aria-label="Предыдущее изображение">
      &#10094;
    </button>

    <div class="slider__viewport">
      <div class="slider__track" id="track">
        <div class="slide" style="background-image: url('./images/mountain.png');">
          <span class="slide__label">Горный рассвет</span>
        </div>
        <div class="slide" style="background-image: url('./images/see.png');">
          <span class="slide__label">Морская глубина</span>
        </div>
        <div class="slide" style="background-image: url('./images/forest.png');">
          <span class="slide__label">Весенний лес</span>
        </div>
        <div class="slide" style="background-image: url('./images/desert.png');">
          <span class="slide__label">Пустынный закат</span>
        </div>
        <div class="slide" style="background-image: url('./images/city.png');">
          <span class="slide__label">Ночной город</span>
        </div>
      </div>
    </div>

    <button class="slider__btn slider__btn--next" id="nextBtn" aria-label="Следующее изображение">
      &#10095;
    </button>

    <div class="slider__counter" id="counter">Изображение 1 из 5</div>

  </main>

  <script src="script.js"></script>
</body>
</html>
